version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/savecircle
      - STELLAR_NETWORK=TESTNET
    depends_on:
      - db
    volumes:
      - .:/app
    command: cargo run

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: savecircle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: